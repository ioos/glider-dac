#  S3_ACCESS_KEY:
#    file: secrets/access_key.txt
#  S3_SECRET_KEY:
#    file: secrets/secret_key.txt

services:
  glider-dac-providers-app: &provider_anchor
    container_name: glider-dac-providers-app
    develop:
      watch:
        - action: sync+restart
          initial_sync: true
          path: .
          target: /glider-dac
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    restart: always
    build: .
    ports:
      - 5000:5000
    volumes:
      #- ./config.local.yml:/glider-dac/config.local.yml
      - log_volume:/glider-dac/logs
      - ${DATA_VOLUME:-data_volume}:/data
      - erddap_big_parent_directory:/erddapData
      - ./datasets.xml:/data/catalog/priv_erddap/datasets.xml
      - /data/catalog/priv_erddap
    #secrets:
    #  - S3_ACCESS_KEY
    #  - S3_SECRET_KEY
    environment:
      - FLASK_APP=glider_dac:create_app
      - DATA_ROOT=${DATA_ROOT}
      - DATA_VOLUME=${DATA_VOLUME}
      - FLAGS_DIR=${FLAGS_DIR}
      - REDIS_HOST=${REDIS_HOST}
    depends_on:
      - postgres
      - redis

  glider-dac-worker:
    <<: *provider_anchor
    container_name: glider-dac-worker
    command: python glider_dac/worker.py
    ports: []

  glider-dac-watchdog:
    <<: *provider_anchor
    container_name: glider-dac-watchdog
    command: python glider_dac_watchdog.py
    ports: []

  qartod-worker:
    build: .
    command: python /glider-dac/scripts/glider_qartod.py -w
    volumes:
      - ${DATA_VOLUME:-data_volume}:/data
      - log_volume:/glider-dac/logs
    restart: always
    environment:
      - DATA_VOLUME=${DATA_VOLUME}
      - DATA_ROOT=${DATA_ROOT}
      - FLAGS_DIR=${FLAGS_DIR}
      - REDIS_HOST=${REDIS_HOST}

  postgres:
    image: postgis/postgis:18-3.6-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=gliderdac
      - POSTGRES_USER=glider
      - POSTGRES_PASSWORD="$POSTGRES_PASSWORD"
      
      - WALE_S3_PREFIX=s3://your-bucket/gliderdac
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1

    ports:
      - 5432:5432
    volumes:
      - status_postgres:/var/lib/postgresql/data
      - ./wal-g:/usr/local/bin/wal-g
      - postgres-config/postgres.conf:postgres-config/postgres.conf
    
  postgres-backup:
    image: alpine:3.20
    depends_on:
      - postgres
    volumes:
      - ./wal-g:/usr/local/bin/wal-g
    environment:
      - WALE_S3_PREFIX=s3://your-bucket/gliderdac
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=us-east-1
    entrypoint: |
      sh -c "
        while true; do
          sleep 86400;
          wal-g backup-push /var/lib/postgresql/data;
        done
      "
  ``


  thredds:
    container_name: thredds
    image: unidata/thredds-docker:5.8
    ports:
      - 8082:8080
    volumes:
      - ${DATA_VOLUME:-data_volume}:/data
      - ./docker_contrib/catalog.xml:/usr/local/tomcat/content/thredds/catalog.xml
      - ./docker_contrib/threddsConfig.xml:/usr/local/tomcat/content/thredds/threddsConfig.xml
      - thredds_cache:/usr/local/tomcat/content/thredds/cache
      - thredds_logs:/usr/local/tomcat/content/thredds/logs
    environment:
      - DATA_VOLUME=${DATA_VOLUME}
    restart: always

  erddap:
    container_name: erddap
    image: axiom/docker-erddap:v2.30.0
    ports:
      - 8080:8080
    restart: always
    volumes:
      - ${DATA_VOLUME:-data_volume}:/data
      - erddap_big_parent_directory:/erddapData
      - ./datasets.xml:/usr/local/tomcat/content/erddap/datasets.xml
    healthcheck:
      test: ["CMD-SHELL",
         "timeout 5 bash -c 'exec 3<>/dev/tcp/localhost/8080; printf \"GET /erddap/index.html HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -n 5 <&3 | grep -F \"HTTP/1.1 200\"'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - DATA_VOLUME=${DATA_VOLUME}

  redis:
    container_name: redis
    restart: always
    image: redis
    volumes:
      - redis_data:/data

volumes:
  data_volume:
  thredds_cache:
  thredds_logs:
  redis_data:
  status_postgres:
  log_volume:
  erddap_big_parent_directory:
