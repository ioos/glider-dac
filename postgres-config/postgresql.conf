
# Enable WAL archiving
wal_level = replica
archive_mode = on

# Archive WAL files to mounted directory
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'

# Retain enough WAL
max_wal_size = 2GB
min_wal_size = 80MB

# Recommended
checkpoint_timeout = 5min
archive_timeout = 60s

# Optional: replication-friendly
max_wal_senders = 3